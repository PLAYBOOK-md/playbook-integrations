[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[project]
name = "playbook-md"
version = "0.1.0"
description = "Parser, validator, and summarizer for PLAYBOOK.md — multi-step AI workflows in markdown"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "PLAYBOOK.md contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
    "Topic :: Text Processing :: Markup :: Markdown",
]

[project.urls]
Homepage = "https://playbook.style"
Documentation = "https://docs.playbook.style"
Repository = "https://github.com/PLAYBOOK-MD/playbook-integrations"
Specification = "https://github.com/PLAYBOOK-MD/playbook-spec"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
